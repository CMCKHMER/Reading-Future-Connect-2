<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aii Language Center - Dictation Worksheet</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --paper-color: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --secondary-color: #f9f9f9;
            --border-color: #ddd;
            --highlight-color: #e3f2fd;
            --success-color: #2ecc71;
            --locked-text: #2c3e50;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
            --input-border: #333;
            --frame-color: #003355; /* Matches Aii brand color */
        }

        body.dark-mode {
            --bg-color: #1e1e1e;
            --paper-color: #2d2d2d;
            --text-color: #e0e0e0;
            --primary-color: #64b5f6;
            --secondary-color: #383838;
            --border-color: #555;
            --highlight-color: #37474f;
            --success-color: #81c784;
            --locked-text: #ffffff;
            --shadow: 0 2px 5px rgba(0,0,0,0.5);
            --input-border: #aaa;
            --frame-color: #64b5f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .controls {
            background: var(--paper-color);
            padding: 15px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            transition: background-color 0.3s;
        }

        select, button, input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 16px;
            background-color: var(--paper-color);
            color: var(--text-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover { opacity: 0.9; }
        button.print-btn { background-color: var(--success-color); }
        button.theme-btn { background-color: #555; }
        button#copy-link-btn { background-color: #ff9800; }
        
        .hidden { display: none !important; }

        /* --- MAIN WORKSHEET FRAME --- */
        .worksheet-container {
            background: var(--paper-color);
            width: 100%;
            max-width: 800px;
            padding: 0; /* Removed inner padding to let frame touch edges */
            box-shadow: var(--shadow);
            min-height: 900px; /* Increased height for footer space */
            position: relative;
            border: 1px solid var(--frame-color); /* THIN FRAME AROUND ENTIRE SHEET */
            transition: background-color 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER AREA WITH THIN FRAME --- */
        .header-area {
            border-bottom: 1px solid var(--frame-color); /* THIN BOTTOM FRAME FOR HEADER */
            padding: 30px 40px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-container img {
            max-height: 80px;
            width: auto;
            object-fit: contain;
        }

        .name-date-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            margin-top: 10px;
        }

        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; color: var(--text-color); opacity: 0.8; margin-bottom: 5px; font-weight: bold; }
        .input-group input {
            border: none; border-bottom: 1px solid var(--input-border); border-radius: 0;
            width: 200px; font-size: 18px; background: transparent; color: var(--text-color);
        }

        /* --- CONTENT AREA (SPACED FROM HEADER) --- */
        .content-area {
            padding: 40px 40px 20px 40px; /* TOP PADDING CREATES SPACE BELOW HEADER */
            flex-grow: 1;
        }

        h2.unit-title { 
            text-align: center; 
            color: var(--primary-color); 
            margin-bottom: 30px; /* EXTRA SPACE BEFORE TEXT STARTS */
            font-size: 22px;
        }

        .content-text { 
            line-height: 2.4; /* INCREASED LINE HEIGHT FOR BETTER READING */
            font-size: 18px; 
            margin-bottom: 40px; 
            text-align: justify; /* MAKES TEXT LOOK MORE LIKE A PRINTED DOCUMENT */
        }

        .blank {
            display: inline-block; min-width: 100px; border-bottom: 1px dashed var(--border-color);
            text-align: center; padding: 2px 8px; margin: 0 4px; vertical-align: bottom;
            transition: all 0.2s; color: transparent; cursor: pointer;
        }
        .blank:hover { background-color: var(--highlight-color); border-bottom-color: var(--primary-color); }
        .blank.filled { border-bottom: 1px solid var(--success-color); color: var(--locked-text); font-weight: bold; }

        /* --- WORD BANK --- */
        .word-bank {
            background-color: var(--secondary-color); border: 1px dashed var(--border-color);
            padding: 20px; border-radius: 4px; margin-top: 30px; transition: background-color 0.3s;
        }
        .word-bank h3 { margin-top: 0; font-size: 14px; color: var(--text-color); opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .words-grid { display: flex; flex-wrap: wrap; gap: 10px; }

        .word-chip {
            background: var(--paper-color); border: 1px solid var(--border-color);
            padding: 8px 14px; border-radius: 16px; cursor: pointer; user-select: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); font-weight: 500; transition: all 0.2s; color: var(--text-color);
            font-size: 15px;
        }
        .word-chip:hover { transform: translateY(-2px); border-color: var(--primary-color); }
        .word-chip.selected {
            background-color: var(--primary-color); color: white; border-color: var(--primary-color);
            transform: scale(1.05); box-shadow: 0 0 8px rgba(74, 144, 226, 0.4);
        }
        .word-chip.used {
            opacity: 0.3; pointer-events: none; text-decoration: line-through;
            background-color: var(--secondary-color); border-color: var(--border-color);
            transform: none; box-shadow: none;
        }

        /* --- FOOTER AREA WITH THIN FRAME --- */
        .footer-area {
            border-top: 1px solid var(--frame-color); /* THIN TOP FRAME FOR FOOTER */
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-color);
            opacity: 0.7;
            margin-top: auto; /* PUSHES FOOTER TO BOTTOM */
        }

        @media print {
            @page { margin: 0.5cm; size: A4; }
            body { background: white !important; color: black !important; padding: 0; -webkit-print-color-adjust: exact; }
            .controls, .word-bank, .no-print { display: none !important; }
            .worksheet-container { 
                box-shadow: none !important; 
                border: 1px solid #000 !important; /* KEEP FRAME WHEN PRINTING */
                width: 100% !important; max-width: 100% !important; 
                background: white !important; color: black !important;
                min-height: auto !important;
            }
            .header-area { border-bottom: 1px solid #000 !important; padding: 20px 30px 15px 30px !important; }
            .footer-area { border-top: 1px solid #000 !important; padding: 15px 30px !important; }
            .content-area { padding: 30px 30px 10px 30px !important; }
            .blank { border-bottom: 1px solid #000 !important; color: black !important; font-weight: bold; }
            .input-group input { border-bottom: 1px solid #000 !important; color: black !important; }
            h2.unit-title { color: black !important; }
            .logo-container img { filter: grayscale(100%) contrast(100%); }
        }
    </style>
</head>

        let currentUnitId = 1;
        let selectedWordElement = null;

        const unitSelect = document.getElementById('unit-select');
        const unitTitle = document.getElementById('unit-title');
        const textContent = document.getElementById('text-content');
        const wordBankGrid = document.getElementById('word-bank-grid');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const unitSelectorContainer = document.getElementById('unit-selector-container');
        const pageIndicator = document.getElementById('page-indicator');

        function init() {
            units.forEach(unit => {
                const option = document.createElement('option');
                option.value = unit.id;
                option.textContent = unit.title;
                unitSelect.appendChild(option);
            });

            const urlParams = new URLSearchParams(window.location.search);
            const unitParam = urlParams.get('unit');

            if (unitParam) {
                const parsedUnit = parseInt(unitParam);
                if (parsedUnit >= 1 && parsedUnit <= 16) {
                    loadUnit(parsedUnit);
                    unitSelect.value = parsedUnit;
                    unitSelectorContainer.classList.add('hidden');
                } else {
                    loadUnit(1);
                }
            } else {
                loadUnit(1);
            }

            unitSelect.addEventListener('change', (e) => {
                const newId = parseInt(e.target.value);
                loadUnit(newId);
                updateURL(newId);
            });
        }

        function updateURL(id) {
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + "?unit=" + id;
            window.history.pushState({ path: newUrl }, '', newUrl);
        }

        function loadUnit(id) {
            currentUnitId = id;
            const unit = units.find(u => u.id === id);
            unitTitle.textContent = unit.title;
            selectedWordElement = null;

            // Update footer page indicator
            pageIndicator.textContent = `Unit ${id} of ${units.length}`;

            let html = unit.text.replace(/\{\{(\d+)\}\}/g, '<span class="blank" data-index="$1"></span>');
            textContent.innerHTML = html;

            renderWordBank(unit.words);
            attachBlankEvents();
        }

        function renderWordBank(words) {
            wordBankGrid.innerHTML = '';
            words.forEach((word) => {
                const chip = document.createElement('div');
                chip.className = 'word-chip';
                chip.textContent = word;
                chip.dataset.word = word;
                chip.addEventListener('click', () => handleWordClick(chip));
                wordBankGrid.appendChild(chip);
            });
        }

        function handleWordClick(chip) {
            if (selectedWordElement === chip) {
                chip.classList.remove('selected');
                selectedWordElement = null;
                return;
            }
            if (selectedWordElement) selectedWordElement.classList.remove('selected');
            selectedWordElement = chip;
            chip.classList.add('selected');
        }

        function attachBlankEvents() {
            const blanks = document.querySelectorAll('.blank');
            blanks.forEach(blank => {
                blank.addEventListener('click', () => {
                    if (selectedWordElement) {
                        const wordText = selectedWordElement.textContent;
                        blank.textContent = wordText;
                        blank.classList.add('filled');
                        selectedWordElement.classList.add('used');
                        selectedWordElement.classList.remove('selected');
                        selectedWordElement = null;
                    } else if (blank.classList.contains('filled')) {
                        const wordText = blank.textContent;
                        blank.textContent = '';
                        blank.classList.remove('filled');
                        const chips = Array.from(document.querySelectorAll('.word-chip'));
                        const sourceChip = chips.find(c => c.textContent === wordText && c.classList.contains('used'));
                        if (sourceChip) sourceChip.classList.remove('used');
                    }
                });
            });
        }

        function resetWorksheet() {
            if(confirm("Clear all answers?")) {
                loadUnit(currentUnitId);
                document.querySelector('input[placeholder="Enter Name"]').value = '';
                document.querySelector('input[placeholder="Enter Date"]').value = '';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            themeToggleBtn.textContent = isDark ? "️ Light Mode" : "🌙 Dark Mode";
        }

        function copyShareableLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('copy-link-btn');
                const originalText = btn.textContent;
                btn.textContent = "✅ Link Copied!";
                btn.style.backgroundColor = "#2ecc71";
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.backgroundColor = "#ff9800";
                }, 2000);
            }).catch(err => {
                alert("Failed to copy link. Please copy manually from the address bar.");
            });
        }

        init();
    </script>
</body>
</html>
